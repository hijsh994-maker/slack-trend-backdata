name: Import log markdown from URL


 

on:

  workflow_dispatch:

    inputs:

      file_url:

        description: "Download URL of logs/YYYY-MM-dd.md generated by the assistant"

        required: true

      output_path:

        description: "Where to save in repo (e.g., logs/2026-07-23.md)"

        required: true


 

permissions:

  contents: write


 

jobs:

  import:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout

        uses: actions/checkout@v4


 

      - name: Download markdown

        run: |

          mkdir -p "$(dirname \"${{ inputs.output_path }}\")"

          curl -L "${{ inputs.file_url }}" -o "${{ inputs.output_path }}"


 

      - name: Commit and push

        run: |

          if git status --porcelain | grep -q .; then

            git config user.name "github-actions[bot]"

            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            git add "${{ inputs.output_path }}"

            git commit -m "chore(logs): add ${{ inputs.output_path }}"

            git push

          else

            echo "No changes to commit."

          fi
